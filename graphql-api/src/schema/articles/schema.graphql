type Article {
	id: ID!
	title: String!
	content: String!
	author: String!
	publishedAt: DateTime
	imageUrl: String
	tags: [String!]!
	isPublished: Boolean!
	createdAt: DateTime!
	updatedAt: DateTime!
}

extend type Query {
	articles(limit: Int = 10, offset: Int = 0, published: Boolean): [Article!]!

	article(id: ID!): Article
}

extend type Mutation {
	createArticle(input: CreateArticleInput!): Article!
	updateArticle(id: ID!, input: UpdateArticleInput!): Article!
	deleteArticle(id: ID!): Boolean!
}

input CreateArticleInput {
	title: String!
	content: String!
	author: String!
	imageUrl: String
	tags: [String!] = []
	isPublished: Boolean = false
}

input UpdateArticleInput {
	title: String!
	content: String!
	imageUrl: String
	tags: [String!] = []
	isPublished: Boolean = false
}
